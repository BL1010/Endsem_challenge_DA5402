<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .movie {
            background: white;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border-left: 5px solid #007BFF;
        }

        .score {
            color: #555;
            font-size: 0.9em;
        }

        #results {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>🎬 Movie Recommender</h1>

    <div class="container">
        <label>User ID:</label>
        <input type="number" id="user" value="1">

        <label>Top K:</label>
        <input type="number" id="k" value="5">

        <button onclick="getRecommendations()">Get Recommendations</button>
    </div>

    <div id="results"></div>

    <script>
        async function getRecommendations() {
            const user = parseInt(document.getElementById("user").value);
            const k = parseInt(document.getElementById("k").value);

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "<p>Loading...</p>";

            try {
                const response = await fetch("/recommend", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ user: user, k: k })
                });

                const data = await response.json();

                let html = "<h2>Recommendations:</h2>";

                data.recommendations.forEach((r, index) => {
                    html += `
                        <div class="movie">
                            <b>${index + 1}. ${r.name}</b><br>
                            <span class="score">Score: ${r.score.toFixed(4)}</span>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = "<p style='color:red;'>Error fetching recommendations</p>";
                console.error(error);
            }
        }
    </script>

</body>
</html>
